<html lang="pt-BR">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {

    --atencao: #d97706; --atencao-bg: #fef3c7; --atencao-border: #fcd34d;
    --critico: #dc2626; --critico-bg: #fee2e2; --critico-border: #fca5a5;
    --saindo: #6b7280; --saindo-bg: #f3f4f6; --saindo-border: #d1d5db;
    --sem-reg: #9ca3af; --sem-reg-bg: #f9fafb; --sem-reg-border: #e5e7eb;
    --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b;
    --border: #e2e8f0; --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* HEADER */
  .header { background: #0f172a; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header h1 span { color: #f59e0b; }
  .header-meta { font-size: 12px; color: #94a3b8; }

  /* SUMMARY */
  .summary { display: flex; gap: 10px; padding: 16px 24px 0; flex-wrap: wrap; }
  .summary-card { flex: 1; min-width: 110px; border-radius: var(--radius); padding: 12px 16px; cursor: pointer; border: 2px solid transparent; transition: all .15s; }
  .summary-card:hover { transform: translateY(-2px); }
  .summary-card.active { border-width: 2px; }
  .summary-card .count { font-size: 28px; font-weight: 800; line-height: 1; }
  .summary-card .label { font-size: 11px; font-weight: 600; text-transform: uppercase; margin-top: 4px; opacity: .8; }
  .sc-satisfeito { background: var(--satisfeito-bg); color: var(--satisfeito); }
  .sc-satisfeito.active { border-color: var(--satisfeito); }
  .sc-estavel { background: var(--estavel-bg); color: var(--estavel); }
  .sc-estavel.active { border-color: var(--estavel); }
  .sc-atencao { background: var(--atencao-bg); color: var(--atencao); }
  .sc-atencao.active { border-color: var(--atencao); }
  .sc-critico { background: var(--critico-bg); color: var(--critico); }
  .sc-critico.active { border-color: var(--critico); }
  .sc-saindo { background: var(--saindo-bg); color: var(--saindo); }
  .sc-saindo.active { border-color: var(--saindo); }
  .sc-todos { background: #e2e8f0; color: #334155; }
  .sc-todos.active { border-color: #334155; }

  /* TABS */
  .tabs { display: flex; gap: 0; padding: 16px 24px 0; border-bottom: none; }
  .tab-btn { padding: 8px 20px; cursor: pointer; border: none; background: #e2e8f0; color: var(--muted); font-size: 13px; font-weight: 600; border-radius: 8px 8px 0 0; margin-right: 4px; }
  .tab-btn.active { background: var(--card); color: var(--text); box-shadow: 0 -2px 0 #f59e0b inset; }

  /* MAIN CONTENT */
  .content { padding: 0 24px 32px; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* SEARCH */
  .toolbar { display: flex; gap: 10px; padding: 16px 0 12px; align-items: center; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 200px; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; background: white; }
  .search-box:focus { border-color: #f59e0b; }

  /* CLIENT GRID */
  .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .client-card { background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border); padding: 14px 16px; cursor: pointer; transition: all .15s; position: relative; }
  .client-card:hover { border-color: #f59e0b; box-shadow: 0 4px 12px rgba(0,0,0,.08); transform: translateY(-1px); }
  .client-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .client-name { font-weight: 700; font-size: 13px; line-height: 1.3; flex: 1; padding-right: 8px; }
  .badge { padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; white-space: nowrap; }
  .badge-satisfeito { background: var(--satisfeito-bg); color: var(--satisfeito); border: 1px solid var(--satisfeito-border); }
  .badge-estavel { background: var(--estavel-bg); color: var(--estavel); border: 1px solid var(--estavel-border); }
  .badge-atencao { background: var(--atencao-bg); color: var(--atencao); border: 1px solid var(--atencao-border); }
  .badge-critico { background: var(--critico-bg); color: var(--critico); border: 1px solid var(--critico-border); }
  .badge-saindo { background: var(--saindo-bg); color: var(--saindo); border: 1px solid var(--saindo-border); }
  .badge-sem_registro { background: var(--sem-reg-bg); color: var(--sem-reg); border: 1px solid var(--sem-reg-border); }
  .client-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .client-resumo { font-size: 12px; color: #475569; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .client-updated { font-size: 10px; color: #94a3b8; margin-top: 8px; }
  .hidden { display: none !important; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: white; border-radius: 14px; width: 100%; max-width: 720px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
  .modal-title { font-size: 18px; font-weight: 800; }
  .modal-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); padding: 0 4px; }
  .modal-body { overflow-y: auto; padding: 20px 24px; flex: 1; }
  .modal-section { margin-bottom: 20px; }
  .modal-section h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: .5px; margin-bottom: 10px; }
  .history-item { border-left: 3px solid var(--border); padding: 8px 0 8px 14px; margin-bottom: 12px; }
  .history-date { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
  .history-text { font-size: 13px; color: #334155; line-height: 1.6; }
  .actions-list { list-style: none; }
  .actions-list li { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; gap: 8px; }
  .actions-list li:last-child { border-bottom: none; }
  .action-owner { font-weight: 600; color: #0f172a; white-space: nowrap; }

  /* MEETINGS TAB */
  .meeting-list { display: flex; flex-direction: column; gap: 12px; padding-top: 16px; }
  .meeting-card { background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border); overflow: hidden; }
  .meeting-header { padding: 14px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .meeting-header:hover { background: #f8fafc; }
  .meeting-date { font-weight: 800; font-size: 14px; }
  .meeting-summ { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .meeting-toggle { font-size: 18px; color: var(--muted); transition: transform .2s; }
  .meeting-toggle.open { transform: rotate(180deg); }
  .meeting-body { display: none; padding: 0 18px 18px; }
  .meeting-body.open { display: block; }
  .meeting-detail { margin-bottom: 16px; }
  .meeting-detail h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: .5px; margin-bottom: 8px; }
  .meeting-detail p { font-size: 13px; color: #334155; line-height: 1.6; }
  .client-mention { display: inline-block; padding: 2px 8px; margin: 2px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
  .actions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 6px; margin-top: 6px; }
  .action-item { background: #f8fafc; border-radius: 6px; padding: 8px 10px; font-size: 12px; border: 1px solid var(--border); }
  .action-item .owner { font-weight: 700; color: #0f172a; }

  /* INDEFINIDO */
  .indefinido-section { background: #fff7ed; border: 1.5px solid #fed7aa; border-radius: var(--radius); padding: 16px; margin-top: 16px; }
  .indefinido-section h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #ea580c; margin-bottom: 10px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
</style>
</head>

// ==============================
// RENDERING
// ==============================
let currentFilter = 'todos';
let currentSearch = '';

function getBadgeClass(status) {
  const map = { satisfeito:'badge-satisfeito', estavel:'badge-estavel', atencao:'badge-atencao', critico:'badge-critico', saindo:'badge-saindo', sem_registro:'badge-sem_registro' };
  return map[status] || 'badge-sem_registro';
}
function getStatusLabel(status) {
  const map = { satisfeito:'✅ Satisfeito', estavel:'🔵 Estável', atencao:'⚠️ Atenção', critico:'🔴 Crítico', saindo:'⛔ Saindo', sem_registro:'— Sem Registro' };
  return map[status] || '—';
}
function getHistoryColor(status) {
  const map = { satisfeito:'#16a34a', estavel:'#2563eb', atencao:'#d97706', critico:'#dc2626', saindo:'#6b7280', sem_registro:'#9ca3af' };
  return map[status] || '#9ca3af';
}

function renderSummary() {
  const counts = { todos: clients.length, satisfeito: 0, estavel: 0, atencao: 0, critico: 0, saindo: 0, sem_registro: 0 };
  clients.forEach(c => { if (counts[c.status] !== undefined) counts[c.status]++; });
  Object.keys(counts).forEach(k => {
    const el = document.getElementById('cnt-' + k);
    if (el) el.textContent = counts[k];
  });
  document.getElementById('total-label').textContent = clients.length + ' clientes ativos';
}

function renderClients() {
  const grid = document.getElementById('client-grid');
  const empty = document.getElementById('empty-state');
  const filtered = clients.filter(c => {
    const matchFilter = currentFilter === 'todos' || c.status === currentFilter;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || c.nome.toLowerCase().includes(q) || c.apelido.toLowerCase().includes(q) ||
      c.sponsor.toLowerCase().includes(q) || c.champion.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
  if (filtered.length === 0) {
    grid.innerHTML = ''; empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    grid.innerHTML = filtered.map(c => `
      <div class="client-card" onclick="openClient('${c.id}')">
        <div class="client-card-header">
          <div class="client-name">${c.nome}</div>
          <span class="badge ${getBadgeClass(c.status)}">${getStatusLabel(c.status).replace(/[✅🔵⚠️🔴⛔—] ?/,'')}</span>
        </div>
        <div class="client-meta">👤 ${c.sponsor} ${c.champion !== c.sponsor ? '· ' + c.champion : ''}</div>
        <div class="client-resumo">${c.resumo}</div>
        <div class="client-updated">${c.ultimaAtualizacao !== '—' ? '📅 Último registro: ' + new Date(c.ultimaAtualizacao).toLocaleDateString('pt-BR') : '📅 Sem registros'}</div>
      </div>
    `).join('');
  }
}

function filterClients(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.summary-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderClients();
}

function searchClients(q) {
  currentSearch = q;
  renderClients();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function openClient(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  document.getElementById('modal-title').textContent = c.nome;
  document.getElementById('modal-sub').innerHTML = `
    <span class="badge ${getBadgeClass(c.status)}" style="margin-right:8px">${getStatusLabel(c.status)}</span>
    Sponsor: <strong>${c.sponsor}</strong> · Champion: <strong>${c.champion}</strong>`;

  let html = '';

  // Resumo atual
  html += `<div class="modal-section"><h3>📊 Situação Atual</h3><p style="font-size:14px;line-height:1.7;color:#334155">${c.resumo}</p></div>`;

  // Ações pendentes
  if (c.acoes.length > 0) {
    html += `<div class="modal-section"><h3>✅ Ações Pendentes</h3><ul class="actions-list">`;
    c.acoes.forEach(a => {
      html += `<li><span class="action-owner">${a.responsavel}:</span> ${a.acao}</li>`;
    });
    html += '</ul></div>';
  }

  // Histórico
  if (c.historico.length > 0) {
    html += `<div class="modal-section"><h3>📅 Histórico por Reunião</h3>`;
    [...c.historico].reverse().forEach(h => {
      const d = new Date(h.data).toLocaleDateString('pt-BR', {day:'2-digit',month:'long',year:'numeric'});
      html += `<div class="history-item" style="border-left-color:${getHistoryColor(c.status)}">
        <div class="history-date">${d}</div>
        <div class="history-text">${h.texto}</div>
      </div>`;
    });
    html += '</div>';
  } else {
    html += `<div class="modal-section"><p style="color:#94a3b8;font-style:italic">Nenhum registro encontrado para este cliente nas reuniões do Comitê ELITE.</p></div>`;
  }

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

function renderMeetings() {
  const list = document.getElementById('meeting-list');
  list.innerHTML = meetings.map((m, i) => `
    <div class="meeting-card">
      <div class="meeting-header" onclick="toggleMeeting(${i})">
        <div>
          <div class="meeting-date">📋 ${m.dataFmt}</div>
          <div class="meeting-summ">${m.resumo.substring(0,120)}...</div>
        </div>
        <span class="meeting-toggle" id="toggle-${i}">▼</span>
      </div>
      <div class="meeting-body" id="body-${i}">
        <div class="meeting-detail">
          <h4>🔍 Destaques da Reunião</h4>
          <ul style="padding-left:16px;margin-top:4px">${m.destaques.map(d => `<li style="font-size:13px;color:#334155;margin-bottom:5px;line-height:1.5">${d}</li>`).join('')}</ul>
        </div>
        <div class="meeting-detail">
          <h4>✅ Próximas Etapas Definidas</h4>
          <div class="actions-grid">${m.acoes.map(a => `<div class="action-item"><span class="owner">${a.responsavel}:</span> ${a.acao}</div>`).join('')}</div>
        </div>
        <div class="meeting-detail">
          <h4>🏢 Clientes Mencionados</h4>
          <div style="margin-top:6px">${m.clientesMencionados.map(nome => {
            const c = clients.find(x => x.nome === nome);
            const status = c ? c.status : 'sem_registro';
            return `<span class="client-mention badge ${getBadgeClass(status)}" onclick="openClientByName('${nome}')">${nome}</span>`;
          }).join('')}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleMeeting(i) {
  const body = document.getElementById('body-' + i);
  const toggle = document.getElementById('toggle-' + i);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  toggle.classList.toggle('open', !isOpen);
}

function openClientByName(nome) {
  const c = clients.find(x => x.nome === nome);
  if (c) openClient(c.id);
}

function renderIndefinidos() {
  if (!indefinidos || indefinidos.length === 0) return;
  const sec = document.getElementById('indefinido-section');
  const list = document.getElementById('indefinido-list');
  sec.style.display = 'block';
  list.innerHTML = indefinidos.map(i => `
    <div style="padding:8px 0;border-bottom:1px solid #fed7aa;font-size:13px;color:#7c2d12">
      <strong style="color:#9a3412">📅 ${i.reuniao}:</strong> ${i.trecho}
    </div>
  `).join('');
}

// ==============================
// INIT
// ==============================
renderSummary();
renderClients();
renderMeetings();
renderIndefinidos();

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalBtn();
});
</script>
